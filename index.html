<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vella Co.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f5f5;
color:#111;
overflow-x:hidden;
}

img{
max-width:100%;
display:block;
}

a{
text-decoration:none;
color:inherit;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:1000;
background:#ffffffee;
backdrop-filter:blur(10px);
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #ececec;
}

.logo{
font-size:24px;
font-weight:800;
letter-spacing:1px;
}

.header-icons{
display:flex;
align-items:center;
gap:16px;
}

.icon-btn{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#f5f5f5;
border:none;
font-size:18px;
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-4px;
right:-2px;
background:#000;
color:#fff;
font-size:10px;
font-weight:700;
width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* SEARCH */

.search-box{
padding:14px 18px;
background:#fff;
position:sticky;
top:72px;
z-index:999;
}

.search-box input{
width:100%;
padding:14px 16px;
border:none;
outline:none;
border-radius:14px;
background:#f3f3f3;
font-size:14px;
}

/* BANNER */

.banner{
margin:15px;
height:190px;
border-radius:22px;
overflow:hidden;
position:relative;
background:linear-gradient(135deg,#111,#444);
color:#fff;
display:flex;
align-items:center;
padding:25px;
}

.banner::before{
content:"";
position:absolute;
top:0;
right:-30px;
width:180px;
height:180px;
background:rgba(255,255,255,0.08);
border-radius:50%;
}

.banner-content{
position:relative;
z-index:2;
max-width:230px;
}

.banner h2{
font-size:30px;
line-height:1.1;
margin-bottom:10px;
font-weight:800;
}

.banner p{
font-size:13px;
opacity:.9;
line-height:1.5;
margin-bottom:16px;
}

.banner button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#fff;
color:#000;
font-weight:700;
cursor:pointer;
}

/* SECTION */

.section-title{
padding:5px 18px 16px;
font-size:17px;
font-weight:700;
}

/* PRODUCTS */

.products-grid{
padding:0 15px 30px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.product-card{
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 4px 14px rgba(0,0,0,0.06);
cursor:pointer;
transition:.25s;
}

.product-card:hover{
transform:translateY(-3px);
}

.product-image{
width:100%;
height:210px;
background:#f2f2f2;
overflow:hidden;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
}

.product-info{
padding:12px;
}

.product-name{
font-size:13px;
font-weight:600;
line-height:1.4;
height:38px;
overflow:hidden;
margin-bottom:10px;
}

.price-row{
display:flex;
align-items:center;
gap:6px;
margin-bottom:12px;
flex-wrap:wrap;
}

.price{
font-size:16px;
font-weight:800;
}

.old-price{
font-size:12px;
color:#777;
text-decoration:line-through;
}

.discount{
font-size:11px;
font-weight:700;
color:#00a63e;
}

.shop-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-weight:700;
cursor:pointer;
}

/* PRODUCT PAGE */

#productPage{
display:none;
padding-bottom:100px;
}

.back-btn{
padding:16px;
font-weight:600;
font-size:14px;
cursor:pointer;
}

.product-main-image{
width:100%;
height:420px;
background:#fff;
object-fit:cover;
}

.product-details{
background:#fff;
margin-top:-18px;
border-radius:26px 26px 0 0;
padding:24px 18px;
position:relative;
z-index:2;
}

.product-details h1{
font-size:22px;
margin-bottom:10px;
}

.big-price{
font-size:28px;
font-weight:800;
margin-bottom:18px;
}

.option-title{
font-size:13px;
font-weight:700;
margin-bottom:10px;
text-transform:uppercase;
}

.option-group{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:22px;
}

.option{
padding:10px 18px;
border-radius:12px;
background:#f3f3f3;
font-size:13px;
font-weight:600;
cursor:pointer;
border:2px solid transparent;
}

.option.active{
background:#111;
color:#fff;
}

.action-buttons{
display:flex;
gap:12px;
}

.action-buttons button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:14px;
font-weight:700;
cursor:pointer;
}

.cart-btn{
background:#ededed;
}

.buy-btn{
background:#111;
color:#fff;
}

/* CART */

#cartPage{
display:none;
padding:18px;
padding-bottom:100px;
}

.cart-item{
display:flex;
gap:12px;
background:#fff;
padding:12px;
border-radius:18px;
margin-bottom:14px;
align-items:center;
}

.cart-item img{
width:75px;
height:75px;
border-radius:12px;
object-fit:cover;
}

.cart-details{
flex:1;
}

.cart-details h4{
font-size:13px;
margin-bottom:5px;
}

.cart-details p{
font-size:12px;
color:#666;
}

.remove-btn{
background:red;
color:#fff;
border:none;
width:34px;
height:34px;
border-radius:50%;
cursor:pointer;
}

.total-box{
margin-top:18px;
background:#111;
color:#fff;
padding:18px;
border-radius:18px;
font-size:18px;
font-weight:700;
}

.checkout-btn{
width:100%;
margin-top:15px;
padding:16px;
border:none;
border-radius:16px;
background:#25D366;
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
}

/* FOOTER */

footer{
background:#fff;
padding:28px 20px;
text-align:center;
border-top:1px solid #eee;
}

.footer-socials{
display:flex;
justify-content:center;
gap:16px;
margin-bottom:16px;
}

.footer-socials a{
width:46px;
height:46px;
border-radius:50%;
background:#111;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

footer p{
font-size:12px;
color:#666;
}

/* MOBILE */

@media(min-width:768px){

.products-grid{
grid-template-columns:repeat(4,1fr);
}

.banner{
height:280px;
}

.banner h2{
font-size:46px;
}

.product-main-image{
height:600px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<div class="logo" onclick="goHome()">VELLA</div>

<div class="header-icons">

<button class="icon-btn">🔍</button>

<button class="icon-btn" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</button>

</div>

</header>

<!-- SEARCH -->

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<!-- HOME -->

<div id="homePage">

<div class="banner">
<div class="banner-content">
<h2>NEW DROP 2026</h2>
<p>Premium modern fashion collection with luxury style.</p>
<button>Shop Now</button>
</div>
</div>

<div class="section-title">
Trending Collection
</div>

<div class="products-grid" id="productsGrid"></div>

</div>

<!-- PRODUCT PAGE -->

<div id="productPage">

<div class="back-btn" onclick="goHome()">
⬅ Back
</div>

<img id="productImage" class="product-main-image">

<div class="product-details">

<h1 id="productTitle"></h1>

<div class="big-price" id="productPrice"></div>

<div class="option-title">
Select Size
</div>

<div class="option-group">

<div class="option size-option" onclick="selectOption(this,'size')">S</div>
<div class="option size-option" onclick="selectOption(this,'size')">M</div>
<div class="option size-option" onclick="selectOption(this,'size')">L</div>
<div class="option size-option" onclick="selectOption(this,'size')">XL</div>

</div>

<div class="option-title">
Select Quantity
</div>

<div class="option-group">

<div class="option qty-option active" onclick="selectOption(this,'qty')">1</div>
<div class="option qty-option" onclick="selectOption(this,'qty')">2</div>
<div class="option qty-option" onclick="selectOption(this,'qty')">3</div>

</div>

<div class="action-buttons">

<button class="cart-btn" onclick="addToCart()">
Add To Cart
</button>

<button class="buy-btn" onclick="buyNow()">
Buy Now
</button>

</div>

</div>

</div>

<!-- CART PAGE -->

<div id="cartPage">

<div class="back-btn" onclick="goHome()">
⬅ Back
</div>

<h2 style="margin-bottom:18px;">
Shopping Cart
</h2>

<div id="cartItems"></div>

<div class="total-box">
Total: ₹<span id="totalPrice">0</span>
</div>

<button class="checkout-btn" onclick="checkoutWhatsApp()">
Order On WhatsApp
</button>

</div>

<!-- FOOTER -->

<footer>

<div class="footer-socials">

<a href="https://instagram.com" target="_blank">📷</a>

<a href="https://t.me" target="_blank">✈️</a>

<a href="https://wa.me/918929094129" target="_blank">💬</a>

</div>

<p>
© 2026 Vella Co. All Rights Reserved.
</p>

</footer>

<script>

const products = [

{
id:1,
name:"Premium White Hoodie",
price:1499,
image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800"
},

{
id:2,
name:"Luxury Black T-Shirt",
price:999,
image:"https://images.unsplash.com/photo-1503341455253-b2bc71f093b1?w=800"
},

{
id:3,
name:"Modern Oversized Fit",
price:1299,
image:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800"
},

{
id:4,
name:"Urban Streetwear Tee",
price:899,
image:"https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=800"
},

{
id:5,
name:"Premium Grey Hoodie",
price:1699,
image:"https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=800"
},

{
id:6,
name:"Classic Fashion Shirt",
price:1199,
image:"https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800"
}

];

let currentProduct = null;
let selectedSize = "";
let selectedQty = "1";
let cart = [];

/* RENDER PRODUCTS */

function renderProducts(data = products){

const grid = document.getElementById("productsGrid");

grid.innerHTML = "";

data.forEach(product=>{

grid.innerHTML += `

<div class="product-card" onclick="openProduct(${product.id})">

<div class="product-image">
<img src="${product.image}">
</div>

<div class="product-info">

<div class="product-name">
${product.name}
</div>

<div class="price-row">

<div class="price">
₹${product.price}
</div>

<div class="old-price">
₹${product.price + 600}
</div>

<div class="discount">
40% OFF
</div>

</div>

<button class="shop-btn">
Shop Now
</button>

</div>

</div>

`;

});

}

renderProducts();

/* SEARCH */

function searchProducts(){

const value = document.getElementById("searchInput").value.toLowerCase();

const filtered = products.filter(product =>
product.name.toLowerCase().includes(value)
);

renderProducts(filtered);

}

/* OPEN PRODUCT */

function openProduct(id){

currentProduct = products.find(p=>p.id === id);

document.getElementById("homePage").style.display = "none";
document.getElementById("cartPage").style.display = "none";
document.getElementById("productPage").style.display = "block";

document.getElementById("productImage").src = currentProduct.image;
document.getElementById("productTitle").innerText = currentProduct.name;
document.getElementById("productPrice").innerText = "₹" + currentProduct.price;

window.scrollTo(0,0);

}

/* GO HOME */

function goHome(){

document.getElementById("productPage").style.display = "none";
document.getElementById("cartPage").style.display = "none";
document.getElementById("homePage").style.display = "block";

}

/* SELECT */

function selectOption(element,type){

if(type === "size"){

document.querySelectorAll(".size-option").forEach(el=>{
el.classList.remove("active");
});

element.classList.add("active");

selectedSize = element.innerText;

}

if(type === "qty"){

document.querySelectorAll(".qty-option").forEach(el=>{
el.classList.remove("active");
});

element.classList.add("active");

selectedQty = element.innerText;

}

}

/* ADD TO CART */

function addToCart(){

if(selectedSize === ""){

alert("Please select size");

return;

}

cart.push({

...currentProduct,
size:selectedSize,
qty:selectedQty

});

document.getElementById("cartCount").innerText = cart.length;

alert("Added To Cart");

}

/* OPEN CART */

function openCart(){

document.getElementById("homePage").style.display = "none";
document.getElementById("productPage").style.display = "none";
document.getElementById("cartPage").style.display = "block";

renderCart();

}

/* RENDER CART */

function renderCart(){

const cartItems = document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;

if(cart.length === 0){

cartItems.innerHTML = `
<p style="text-align:center;color:#777;">
Cart is empty
</p>
`;

document.getElementById("totalPrice").innerText = "0";

return;

}

cart.forEach((item,index)=>{

const itemTotal = item.price * Number(item.qty);

total += itemTotal;

cartItems.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div class="cart-details">

<h4>${item.name}</h4>

<p>
Size: ${item.size}
</p>

<p>
Qty: ${item.qty}
</p>

<p style="margin-top:5px;font-weight:700;">
₹${itemTotal}
</p>

</div>

<button class="remove-btn" onclick="removeItem(${index})">
×
</button>

</div>

`;

});

document.getElementById("totalPrice").innerText = total;

}

/* REMOVE */

function removeItem(index){

cart.splice(index,1);

document.getElementById("cartCount").innerText = cart.length;

renderCart();

}

/* BUY NOW */

function buyNow(){

addToCart();

openCart();

}

/* WHATSAPP */

function checkoutWhatsApp(){

if(cart.length === 0){

alert("Cart Empty");

return;

}

let text = "🛒 *NEW ORDER* %0A%0A";

cart.forEach((item,index)=>{

text += `${index+1}. ${item.name}%0A`;
text += `Size: ${item.size}%0A`;
text += `Qty: ${item.qty}%0A`;
text += `Price: ₹${item.price * item.qty}%0A%0A`;

});

text += `Total: ₹${document.getElementById("totalPrice").innerText}`;

window.open(
"https://wa.me/918929094129?text=" + text,
"_blank"
);

}

</script>

</body>
</html>
